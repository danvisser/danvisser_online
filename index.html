<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dan Visser Online</title>
  <meta name="description" content="Photography by Dan Visser.">

  <meta property="og:title" content="Dan Visser Online">
  <meta property="og:description" content="Photography by Dan Visser.">
  <meta property="og:image" content="https://danvisser.online/albums/europe_2025/photos/001.jpg">
  <meta property="og:url" content="https://danvisser.online">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <header>
    <div id="album-switcher">
      <button id="title-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span id="title"></span><span class="caret" aria-hidden="true">⌄</span>
      </button>
      <ul id="album-list" role="listbox" hidden></ul>
    </div>
    <p id="name">DAN VISSER</p>
  </header>

  <main id="stage">
    <img id="photo" alt="" />
  </main>

  <button id="play-btn" aria-label="Play music" hidden>
    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <polygon points="6 4 20 12 6 20"/>
    </svg>
    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <rect x="5" y="4" width="4" height="16"/>
      <rect x="15" y="4" width="4" height="16"/>
    </svg>
  </button>
  <audio id="audio" preload="none"></audio>

  <footer>
    <a id="coords" target="_blank" rel="noopener"></a>
  </footer>

  <script src="script.js?v=4"></script>
</body>
</html>
